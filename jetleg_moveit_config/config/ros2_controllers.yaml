# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    leg_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    foot_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

leg_controller:
  ros__parameters:
    joint: knee_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
foot_controller:
  ros__parameters:
    joint: ankle_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity